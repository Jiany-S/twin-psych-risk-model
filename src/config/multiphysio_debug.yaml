paths:
  raw_dir: data/raw
  raw_file: data/raw/data.csv
  run_root: experiments/runs

dataset:
  name: multiphysio
  report_name: MultiPhysio-HRC (bio 60s features)
  path: data/multiphysio
  multiphysio:
    ecg_col: HRV_MeanNN
    eda_col: EDA_mean
    temp_col: EMG_RMSE
    resp_col: RRV_MeanBB
    repetition_offset: 1
    min_rows_per_worker: 40
    stress_label_col: NASA
    stress_threshold: 40.0
    comfort_label_col: Valence

reproducibility:
  seed: 42

targets:
  multi_head:
    enabled: true
  stress:
    label_col: y_stress
  comfort:
    label_col: y_comfort_proxy

task:
  horizon_steps: 1
  window_length: 8
  sampling_rate_hz: 0.0166667  # 60-second feature windows
  window_step: 1

split:
  mode: time
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42

profiles:
  enabled: false
  use_static_meta: false

features:
  timestamp: timestamp
  time_idx: time_idx
  worker_id: worker_id
  protocol_label: protocol_label
  physiology: [ecg, eda, temp]
  use_robot_context: false
  robot_context: [distance_to_robot, robot_speed]
  optional:
    hazard_zone: hazard_zone
    task_phase: task_phase
    specialization_col: specialization_index
    experience_col: experience_level
  hrv:
    include_freq_domain: false
  eda:
    scr_threshold: 0.05
    min_scr_distance: 3

models:
  run_xgb: true
  run_tft: false

xgboost:
  max_depth: 4
  n_estimators: 120
  learning_rate: 0.05
  subsample: 0.9
  colsample_bytree: 0.9
  early_stopping_rounds: 20
  calibration: isotonic
  tree_method: auto
  predictor: auto

tft:
  strategy: multi_model
  max_epochs: 2
  hidden_size: 16
  lstm_layers: 1
  dropout: 0.1
  batch_size: 64
  num_workers: 0
  gpus: 0
  early_stop_patience: 2
  learning_rate: 1.0e-3
  tft_loss: quantile

report:
  top_k_features: 15
